<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Switching frontend…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e8ecf4;
      padding: 2rem;
      text-align: center;
    }
    p { max-width: 32rem; line-height: 1.5; }
    .muted { color: #8b95a8; font-size: 0.9rem; }
    .spinner {
      width: 2rem; height: 2rem;
      border: 3px solid #2a3348;
      border-top-color: #ff6b4a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p id="status">Switching frontend…</p>
    <p class="muted" id="hint">Clearing cached app shell, then loading the active frontend…</p>
  </div>
  <script>
    const status = document.getElementById('status');
    const hint = document.getElementById('hint');
    let tries = 0;

    // Determine target app URL from the switch path
    const parts = location.pathname.split('/').filter(Boolean);
    const targetApp = (parts[parts.length - 1] || '').toLowerCase();

    const APP_URLS = {
      sillytavern: '/',
      lumiverse: '/apps/lumiverse/',
      marinara: '/apps/marinara/',
    };

    function getTargetUrl(app) {
      return APP_URLS[app] || '/';
    }

    async function clearCachedAppShell() {
      // Unregister ALL service workers aggressively
      if ('serviceWorker' in navigator) {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.allSettled(regs.map((r) => r.unregister()));
        } catch (_) {}
      }
      // Clear ALL caches
      if ('caches' in window) {
        try {
          const keys = await caches.keys();
          await Promise.allSettled(keys.map((k) => caches.delete(k)));
        } catch (_) {}
      }
    }

    async function poll() {
      tries += 1;
      try {
        const readyRes = await fetch('/api/ready', { cache: 'no-store' });
        const readyData = await readyRes.json();
        const probes = readyData.ready || {};
        const label = targetApp || 'frontend';
        status.textContent = `Starting ${label}… (${tries * 2}s)`;

        // Check if the TARGET app specifically is ready (not just any app)
        const targetReady = targetApp ? probes[targetApp] : Object.values(probes).some(Boolean);

        if (targetReady) {
          await clearCachedAppShell();
          const targetUrl = getTargetUrl(targetApp);
          const bust = `_hub=${Date.now()}`;
          // Verify the target page is actually serving before redirecting
          try {
            const page = await fetch(targetUrl + '?' + bust, { method: 'HEAD', cache: 'no-store' });
            if (page.ok || page.status === 304) {
              window.location.replace(targetUrl + (targetUrl.includes('?') ? '&' : '?') + bust);
              return;
            }
          } catch (_) {
            // If HEAD fails, try GET
            try {
              const page = await fetch(targetUrl + '?' + bust, { method: 'GET', cache: 'no-store', redirect: 'follow' });
              if (page.ok) {
                window.location.replace(targetUrl + (targetUrl.includes('?') ? '&' : '?') + bust);
                return;
              }
            } catch (_2) {}
          }
          status.textContent = `${label} backend is up but page not ready yet… (${tries * 2}s)`;
        } else {
          const upApps = Object.entries(probes).filter(([, v]) => v).map(([k]) => k);
          if (upApps.length > 0) {
            status.textContent = `Waiting for ${label}… (other apps ready: ${upApps.join(', ')})`;
          }
        }
      } catch (_) {
        status.textContent = `Waiting for backend… (${tries * 2}s)`;
      }

      if (tries > 180) {
        hint.textContent = 'Still starting. Open /hub to pick a frontend, or refresh the app URL directly.';
        return;
      }
      setTimeout(poll, 2000);
    }

    clearCachedAppShell().finally(poll);
  </script>
</body>
</html>
